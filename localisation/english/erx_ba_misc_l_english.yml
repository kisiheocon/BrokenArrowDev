## Loading Tips ##
LOADING_TIP_108: "Dear father, I go now to fulfill my mission and my destiny. I hope it is a destiny that brings honor to our family and if it requires my life, I will sacrifice it gladly to be a good servant of our nation.\n - §YIsao Matsuo - 1944§!"
LOADING_TIP_109: "How pitiable is it to reflect, that you should at the same time counteract his mercies, in detaining by fraud and violence so numerous a part of my brethren under groaning captivity and cruel oppression.\n - §YBenjamin Banneker - August 19th 1791§!"
LOADING_TIP_110: "The price of progress is steep. It remains to be seen if it is insurmountable.\n - §YDouglas Granite - 2275§!"
LOADING_TIP_111: "We should be free, or die in the attempt. There can be no greater objective, there can be no greater sacrifice.\n - §YDouglas Granite - 2275§!"
LOADING_TIP_112: "The civil rights of a people being of the greatest value, it shall ever be our duty to vindicate our brethren.\n - §YFreedom's Journal, March 16, 1827§!"
LOADING_TIP_113: "By Freedom gained, by Truth maintained, Thine Empire shall be strong!\n - §YA. C. Benson 1902§!"
LOADING_TIP_114: "Wider still and wider shall thy bounds be set; God, who made thee mighty, Make thee mightier yet!\n - §YA. C. Benson 1902§!"
LOADING_TIP_115: "Hark, a mighty nation maketh glad reply.\n - §YA. C. Benson 1902§!"
LOADING_TIP_116: "The Constitution itself, plainly written as it is, the safeguard of our federative compact.\n - §YJames K. Polk 1845§!"
LOADING_TIP_117: "It was patriotism, not communism, that inspired me.\n - §YPresident Ho Chi Minh 1960§!"
LOADING_TIP_118: "Nothing is more precious than independence and liberty.\n - §YPresident Ho Chi Minh 1966§!"
LOADING_TIP_119: "The final outcome of a war is often determined by the degree of initiative shown on each side.\n - §YGeneralissimo Chiang Kai-shek 1939§!"
LOADING_TIP_120: "Patriotism demands of us sustained sacrifice.\n - §YGeneralissimo Chiang Kai-shek July 1937§!"
LOADING_TIP_121: "The Revolution has not yet succeeded. Comrades, you must carry on!\n - §YDr. Sun Yat Sen 1925§!"
LOADING_TIP_122: "There is no Christian nation, thus free to choose as we are, which would establish slavery.\n - §YSenator William Seward March 11th 1850§!"
LOADING_TIP_123: "This nation, under God, shall have a new birth of freedom -- and that government of the people, by the people, for the people, shall not perish from the earth.\n - §YPresident Abraham Lincoln, November 19th, 1863§!"
LOADING_TIP_124: "If the British Empire and its Commonwealth last, for a thousand years, men will still say, This was our finest hour.\n - §YPrime Minister Sir Winston Churchill, June 18th, 1940§!"
LOADING_TIP_125: "The honor of the Mexican Army will never be lost... for our right is Justice.\n - §YPresident Antonio López de Santa Anna, 1843§!"
LOADING_TIP_126: "All foreigners who might be caught under arms on Mexican soil should be treated as pirates and shot.\n - §YPresident Antonio López de Santa Anna, December 1835§!"
LOADING_TIP_127: "We are not interested in the possibilities of defeat; they do not exist.\n - §YQueen Victoria, December 1899§!"
LOADING_TIP_128: "The task will be hard. There may be dark days ahead... but we can only do the right as we see the right, and reverently commit our cause to God.\n - §YKing George VI, September 3rd, 1939§!"
